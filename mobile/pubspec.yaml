name: smart_scan
description: Rapid and Accurate Document Digitization
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Camera & Image
  camera: ^0.10.5+5
  image_picker: ^1.0.4
  
  # HTTP & API
  http: ^1.1.0
  http_parser: ^4.0.2
  dio: ^5.3.3
  
  # State Management
  provider: ^6.0.5
  
  # File Handling
  path_provider: ^2.1.1
  path: ^1.8.3
  
  # UI Components
  flutter_svg: ^2.0.9
  
  # Permissions
  permission_handler: ^11.0.1
  
  # Sharing
  share_plus: ^7.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true